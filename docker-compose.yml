services:

  # ── Octane (FrankenPHP) Application ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.octane
    container_name: curzzo_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - curzzo

  # ── Nginx Web Server ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: curzzo_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - curzzo

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: curzzo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE:      ${DB_DATABASE:-curzzo}
      MYSQL_USER:          ${DB_USERNAME:-sail}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"    # use 3307 on host to avoid conflicts with local MySQL
    networks:
      - curzzo
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: curzzo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - curzzo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Queue Worker ───────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile.octane
    container_name: curzzo_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - curzzo
    profiles:
      - full  # run with: docker compose --profile full up

  # ── Node / Vite Dev Server ────────────────────────────────────────────────
  node:
    image: node:20-alpine
    container_name: curzzo_node
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules   # anonymous volume to isolate node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    networks:
      - curzzo
    profiles:
      - full  # run with: docker compose --profile full up

  # ── Mailpit (local email UI) ───────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: curzzo_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI  → http://localhost:8025
      - "1025:1025"   # SMTP
    networks:
      - curzzo
    profiles:
      - full

volumes:
  mysql_data:
  redis_data:

networks:
  curzzo:
    driver: bridge
