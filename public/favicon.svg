<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="ringClip">
      <rect x="0" y="44" width="100" height="56"/>
    </clipPath>
  </defs>

  <!-- White background circle -->
  <circle cx="50" cy="50" r="50" fill="white"/>

  <!-- Ring / head circle — clipped to show only below the diamond -->
  <g clip-path="url(#ringClip)">
    <circle cx="50" cy="57" r="24" fill="none" stroke="#e8f020" stroke-width="1.5"/>
    <circle cx="50" cy="57" r="21" fill="none" stroke="#0d3d4f" stroke-width="8"/>
    <circle cx="50" cy="57" r="17" fill="none" stroke="#e8f020" stroke-width="1.5"/>
  </g>

  <!-- Mortarboard diamond — drawn on top, covers upper ring -->
  <polygon points="50,14 84,33 50,51 16,33" fill="#0d3d4f"/>
  <polygon points="50,14 84,33 50,51 16,33" fill="none" stroke="#e8f020" stroke-width="2.2"/>
</svg>
